<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共享問題抽取機</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div id="status-tag" class="status-loading">正在連線雲端...</div>

      <div class="card">
        <div id="result-display">準備好抽籤了嗎？</div>
        <button
          id="draw-btn"
          class="main-btn"
          onclick="drawQuestion()"
          disabled
        >
          ? 隨機抽取一個問題
        </button>
      </div>

      <div class="controls">
        <button class="text-btn" onclick="toggleAddSection()">
          ? 新增共享問題
        </button>
        <button class="text-btn reset-btn" onclick="resetWeights()">
          ? 重製全部狀態
        </button>
      </div>

      <div id="add-section" class="overlay hidden">
        <div class="modal">
          <h3>新增共享問題</h3>
          <p class="hint">? 新問題被抽中的機率較高！</p>
          <input
            type="text"
            id="new-question-input"
            placeholder="想問大家什麼呢？"
            maxlength="50"
          />
          <div class="button-group">
            <button class="cancel-btn" onclick="toggleAddSection()">
              取消
            </button>
            <button id="submit-btn" class="submit-btn" onclick="addQuestion()">
              確認送出
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
